apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: weops-lite
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: bitnami/redis:5.0
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: weops-lite-secret
              key: REDIS_PASSWORD
        ports:
        - containerPort: 6379
        volumeMounts:
        - mountPath: /bitnami/redis/data
          name: redis-storage
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
